name: Extension build & E2E

# Reusable: the single source of truth for building + testing + packaging the VS
# Code extension. Called by ci.yml (on push/PR) and release.yml (on a tag, where
# it is the E2E gate — the release's publish job runs only if this succeeds).
on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: build · typecheck · E2E · package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Building the WASM server here also guards that the wasm32 cfg-gated code
      # (the synchronous pump) compiles.
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master (SHA-pinned; channel via toolchain input)
        with:
          toolchain: stable
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build the WASM neutral server
        run: cargo build -p nml-lsp --target wasm32-wasip1 --release

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install extension deps
        working-directory: editors/vscode
        run: npm ci

      - name: Type-check
        working-directory: editors/vscode
        run: npm run typecheck

      # `npm test` runs the pretest (bundle:wasm + bundle:js + compile), then
      # drives a real headless VS Code (downloading it + `ms-vscode.wasm-wasi-core`)
      # over the single-root and multi-root E2E suites. `xvfb` gives Electron a
      # virtual display.
      - name: End-to-end tests (headless VS Code)
        working-directory: editors/vscode
        run: xvfb-run -a npm test

      - name: Package the VSIX
        working-directory: editors/vscode
        run: npx --yes @vscode/vsce package --allow-missing-repository

      - name: Upload the VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nml-lang-vsix
          path: editors/vscode/*.vsix
          if-no-files-found: error
